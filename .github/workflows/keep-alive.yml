# Keep-alive Supabase — evita che il progetto free vada in pausa.
#
# Supabase mette in pausa i progetti del piano free dopo ~7 giorni senza
# traffico API. Questo cron manda un ping leggero ogni 2 giorni, così il
# progetto risulta sempre attivo e la sincronizzazione dell'account non si
# rompe mai. Gira sul cloud di GitHub: funziona anche a PC spento.
#
# La chiave usata è la "anon public" — la stessa già presente nel client
# (js/sync-core.js): è pubblica by-design, la sicurezza sta nelle RLS policy.
# Se un giorno il progetto Supabase cambia, aggiornare SUPABASE_URL qui sotto.
#
# NB: questo file è la SORGENTE. Vive nel webroot così il deploy-web (robocopy
# /MIR verso il repo call-of-quiz-web) lo propaga e non lo cancella.

name: keep-alive-supabase

on:
  schedule:
    - cron: '0 6 */2 * *'   # ogni 2 giorni alle 06:00 UTC
  workflow_dispatch:          # permette il lancio manuale dal tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: 'https://axiiyeqnfmthnyiaaeey.supabase.co'
          SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4aWl5ZXFuZm10aG55aWFhZWV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDc1NjEsImV4cCI6MjA5NjY4MzU2MX0.RGAyT6_tDv77HapGb6k8CxOXFeHHXsP75fgLfDILi1Q'
        run: |
          echo "Ping auth health…"
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 \
            "$SUPABASE_URL/auth/v1/health" -H "apikey: $SUPABASE_ANON_KEY")
          echo "auth/v1/health -> $code"

          echo "Ping REST (snapshots)…"
          code2=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 \
            "$SUPABASE_URL/rest/v1/snapshots?select=user_id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "rest/v1/snapshots -> $code2"

          # Basta una risposta dal server per contare come attività.
          if [ "$code" = "000" ] && [ "$code2" = "000" ]; then
            echo "::error::Supabase irraggiungibile (nessuna risposta)."
            exit 1
          fi
          echo "Keep-alive OK."
